<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kassen-App Urbach</title>
<link rel="manifest" href="manifest.json"><meta name="theme-color" content="#111827">
<style>
:root{--bg:#f5f5f4;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#111827;--good:#047857;--bad:#b91c1c;--warn:#b45309}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}header{background:#111827;color:#fff;padding:18px 16px;border-bottom-left-radius:18px;border-bottom-right-radius:18px;position:sticky;top:0;z-index:5}h1{margin:0;font-size:22px}header p{margin:4px 0 0;color:#d1d5db;font-size:14px}.wrap{padding:14px;max-width:840px;margin:0 auto}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:12px 0;box-shadow:0 1px 2px rgba(0,0,0,.04)}h2{font-size:18px;margin:0 0 10px}.grid{display:grid;grid-template-columns:1fr;gap:10px}@media(min-width:700px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}}label{display:block;font-weight:650;font-size:13px;margin-bottom:5px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:12px;border:1px solid #d1d5db;border-radius:12px;background:#fff;font-size:16px}textarea{min-height:72px}button{border:0;border-radius:13px;padding:12px 14px;font-weight:700;background:#111827;color:#fff;cursor:pointer}button.secondary{background:#e5e7eb;color:#111827}button.danger{background:#b91c1c}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.pill{border:1px solid var(--line);background:#f9fafb;border-radius:999px;padding:8px 11px;font-size:13px}.big{font-size:28px;font-weight:800}.muted{color:var(--muted)}.ok{color:var(--good);font-weight:800}.bad{color:var(--bad);font-weight:800}.warn{color:var(--warn);font-weight:800}.result{display:grid;grid-template-columns:1fr 1fr;gap:8px}.metric{background:#f9fafb;border:1px solid var(--line);border-radius:14px;padding:12px}.metric b{display:block;font-size:13px;color:#4b5563;margin-bottom:4px}.metric span{font-size:20px;font-weight:800}.listItem{border:1px solid var(--line);border-radius:14px;padding:10px;margin:8px 0;background:#fff}.small{font-size:13px}.hidden{display:none!important}table{width:100%;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;font-size:13px}th{background:#f9fafb}.report{background:#fff;border-radius:16px;padding:16px;border:1px solid var(--line)}.report h2{font-size:22px}.printOnly{display:none}@media print{body{background:white}header,.noPrint{display:none!important}.wrap{max-width:none;padding:0}.card{box-shadow:none;border:0}.report{border:0}.printOnly{display:block}}
</style>
</head>
<body>
<header><h1>Kassen-App Urbach</h1><p>Tagesabschluss · Monatsübersicht · Excel-Export</p></header>
<div class="wrap">
  <section id="pinBox" class="card noPrint">
    <h2>PIN-Schutz</h2>
    <p class="muted small">Beim ersten Start PIN festlegen. Danach mit PIN entsperren.</p>
    <div class="grid two"><div><label>PIN</label><input id="pinInput" type="password" inputmode="numeric" placeholder="PIN eingeben"></div><div style="align-self:end"><button id="pinBtn">Entsperren / PIN speichern</button></div></div>
    <p id="pinMsg" class="small"></p>
  </section>
  <main id="app" class="hidden">
    <section class="card noPrint"><div class="row"><button class="secondary" id="logoutBtn">Sperren</button><button class="secondary" id="changePinBtn">PIN ändern</button><button class="danger" id="clearBtn">Alle Daten löschen</button></div></section>

    <section class="card noPrint">
      <h2>Tagesabschluss Urbach</h2>
      <div class="grid two">
        <div><label>Datum</label><input id="date" type="date"></div>
        <div><label>Filiale</label><input value="Urbach" disabled></div>
      </div>
      <div class="grid two" style="margin-top:10px">
        <div><label>Anfangsbestand / Wechselgeld</label><input id="startCash" type="number" step="0.01" value="200"></div>
        <div><label>Endbestand Kasse</label><input id="endCash" type="number" step="0.01" placeholder="z. B. 850"></div>
      </div>
    </section>

    <section class="card noPrint">
      <h2>Umsatz-Aufteilung</h2>
      <div class="grid two">
        <div><label>Umsatz 7 %</label><input id="vat7" type="number" step="0.01" placeholder="Essen 7%"></div>
        <div><label>Umsatz 19 %</label><input id="vat19" type="number" step="0.01" placeholder="Getränke 19%"></div>
      </div>
      <p id="diffMsg" class="small"></p>
      <div class="result">
        <div class="metric"><b>Barumsatz</b><span id="cashSales">0,00 €</span></div>
        <div class="metric"><b>7% + 19%</b><span id="vatTotal">0,00 €</span></div>
      </div>
    </section>

    <section class="card noPrint">
      <h2>Ausgaben / Belege</h2>
      <div class="grid three">
        <div><label>Bezeichnung</label><input id="expenseName" placeholder="z. B. Metro"></div>
        <div><label>Betrag</label><input id="expenseAmount" type="number" step="0.01" placeholder="0,00"></div>
        <div style="align-self:end"><button id="addExpenseBtn">Ausgabe hinzufügen</button></div>
      </div>
      <div id="expensesList"></div>
      <p><b>Ausgaben gesamt:</b> <span id="expensesTotal">0,00 €</span></p>
    </section>

    <section class="card noPrint">
      <h2>Speichern & Export</h2>
      <div class="row"><button id="saveDayBtn">Tagesabschluss speichern</button><button class="secondary" id="showReportBtn">Tagesbericht anzeigen</button><button class="secondary" id="printBtn">PDF drucken/speichern</button><button class="secondary" id="excelBtn">Monat als Excel exportieren</button></div>
      <p id="saveMsg" class="small"></p>
    </section>

    <section class="card noPrint">
      <h2>Monatsübersicht</h2>
      <div class="grid two"><div><label>Monat</label><input id="month" type="month"></div><div style="align-self:end"><button class="secondary" id="refreshMonthBtn">Aktualisieren</button></div></div>
      <div id="monthSummary" style="margin-top:10px"></div>
    </section>

    <section id="reportCard" class="card hidden">
      <div class="report" id="report"></div>
    </section>
  </main>
</div>
<script>
const STORE='kassenAppUrbach_v1'; const PIN='kassenAppUrbach_pin';
let state={days:{}}; let currentExpenses=[];
const $=id=>document.getElementById(id);
function money(n){return (Number(n)||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'}
function num(v){return Number(String(v||'').replace(',','.'))||0}
function today(){return new Date().toISOString().slice(0,10)}
function monthNow(){return new Date().toISOString().slice(0,7)}
function load(){try{state=JSON.parse(localStorage.getItem(STORE))||{days:{}}}catch(e){state={days:{}}}}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function getDay(){return {date:$('date').value,filiale:'Urbach',startCash:num($('startCash').value),endCash:num($('endCash').value),vat7:num($('vat7').value),vat19:num($('vat19').value),expenses:currentExpenses.slice()}}
function calcDay(d=getDay()){let cashSales=d.endCash-d.startCash; if(cashSales<0) cashSales=0; const vatTotal=d.vat7+d.vat19; const exp=d.expenses.reduce((s,e)=>s+num(e.amount),0); return {cashSales,vatTotal,diff:vatTotal-cashSales,expensesTotal:exp}}
function renderCalc(){const d=getDay(), c=calcDay(d); $('cashSales').textContent=money(c.cashSales); $('vatTotal').textContent=money(c.vatTotal); $('expensesTotal').textContent=money(c.expensesTotal); const msg=$('diffMsg'); if(Math.abs(c.diff)<0.01){msg.textContent='Aufteilung passt: 7 % + 19 % entspricht dem Barumsatz.'; msg.className='small ok'} else {msg.textContent='Differenz: '+money(c.diff)+' – bitte Endbestand oder Steueraufteilung prüfen.'; msg.className='small bad'} renderExpenses();}
function renderExpenses(){const box=$('expensesList'); box.innerHTML=''; currentExpenses.forEach((e,i)=>{const div=document.createElement('div'); div.className='listItem row'; div.innerHTML='<span><b>'+escapeHtml(e.name||'Ausgabe')+'</b><br><span class="muted small">'+money(e.amount)+'</span></span><button class="secondary" data-del="'+i+'">Löschen</button>'; box.appendChild(div)}); box.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{currentExpenses.splice(Number(b.dataset.del),1); renderCalc();});}
function escapeHtml(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function loadDate(){const d=state.days[$('date').value]; if(d){$('startCash').value=d.startCash??200; $('endCash').value=d.endCash??''; $('vat7').value=d.vat7??''; $('vat19').value=d.vat19??''; currentExpenses=(d.expenses||[]).slice();} else {$('startCash').value=200; $('endCash').value=''; $('vat7').value=''; $('vat19').value=''; currentExpenses=[];} renderCalc();}
function saveDay(){const d=getDay(); state.days[d.date]=d; save(); $('saveMsg').textContent='Tagesabschluss gespeichert.'; $('saveMsg').className='small ok'; renderMonth(); showReport();}
function showReport(){const d=state.days[$('date').value]||getDay(); const c=calcDay(d); let expRows=(d.expenses||[]).map(e=>'<tr><td>'+escapeHtml(e.name)+'</td><td>'+money(e.amount)+'</td></tr>').join('')||'<tr><td>Keine Ausgaben</td><td>'+money(0)+'</td></tr>'; $('report').innerHTML='<h2>Tagesbericht Urbach</h2><p><b>Datum:</b> '+formatDate(d.date)+'</p><table><tr><th>Position</th><th>Betrag</th></tr><tr><td>Anfangsbestand / Wechselgeld</td><td>'+money(d.startCash)+'</td></tr><tr><td>Endbestand Kasse</td><td>'+money(d.endCash)+'</td></tr><tr><td>Barumsatz</td><td><b>'+money(c.cashSales)+'</b></td></tr><tr><td>Umsatz 7 %</td><td>'+money(d.vat7)+'</td></tr><tr><td>Umsatz 19 %</td><td>'+money(d.vat19)+'</td></tr><tr><td>Differenz Steueraufteilung</td><td>'+money(c.diff)+'</td></tr></table><h2 style="margin-top:18px">Ausgaben</h2><table><tr><th>Beleg</th><th>Betrag</th></tr>'+expRows+'<tr><td><b>Ausgaben gesamt</b></td><td><b>'+money(c.expensesTotal)+'</b></td></tr></table>'; $('reportCard').classList.remove('hidden');}
function formatDate(s){if(!s)return''; const [y,m,d]=s.split('-'); return d+'.'+m+'.'+y}
function renderMonth(){const m=$('month').value; const days=Object.values(state.days).filter(d=>d.date&&d.date.startsWith(m)).sort((a,b)=>a.date.localeCompare(b.date)); let totals={cash:0,vat7:0,vat19:0,exp:0,days:0}; days.forEach(d=>{const c=calcDay(d); totals.cash+=c.cashSales; totals.vat7+=d.vat7; totals.vat19+=d.vat19; totals.exp+=c.expensesTotal; totals.days++;}); let rows=days.map(d=>{const c=calcDay(d); return '<tr><td>'+formatDate(d.date)+'</td><td>'+money(c.cashSales)+'</td><td>'+money(d.vat7)+'</td><td>'+money(d.vat19)+'</td><td>'+money(c.expensesTotal)+'</td></tr>'}).join('')||'<tr><td colspan="5">Noch keine Tagesabschlüsse in diesem Monat.</td></tr>'; $('monthSummary').innerHTML='<div class="result"><div class="metric"><b>Tage</b><span>'+totals.days+'</span></div><div class="metric"><b>Barumsatz Monat</b><span>'+money(totals.cash)+'</span></div><div class="metric"><b>Umsatz 7 %</b><span>'+money(totals.vat7)+'</span></div><div class="metric"><b>Umsatz 19 %</b><span>'+money(totals.vat19)+'</span></div></div><table style="margin-top:10px"><tr><th>Datum</th><th>Bar</th><th>7%</th><th>19%</th><th>Ausgaben</th></tr>'+rows+'</table>'}
function exportExcel(){const m=$('month').value; const days=Object.values(state.days).filter(d=>d.date&&d.date.startsWith(m)).sort((a,b)=>a.date.localeCompare(b.date)); let html='<html><head><meta charset="utf-8"></head><body><h1>Kassenbericht Urbach '+m+'</h1><table border="1"><tr><th>Datum</th><th>Anfangsbestand</th><th>Endbestand</th><th>Barumsatz</th><th>Umsatz 7%</th><th>Umsatz 19%</th><th>Differenz</th><th>Ausgaben</th><th>Ausgaben Details</th></tr>'; let t={start:0,end:0,cash:0,v7:0,v19:0,diff:0,exp:0}; days.forEach(d=>{const c=calcDay(d); t.cash+=c.cashSales;t.v7+=d.vat7;t.v19+=d.vat19;t.diff+=c.diff;t.exp+=c.expensesTotal; const detail=(d.expenses||[]).map(e=>(e.name||'Ausgabe')+' '+money(e.amount)).join(' | '); html+='<tr><td>'+formatDate(d.date)+'</td><td>'+money(d.startCash)+'</td><td>'+money(d.endCash)+'</td><td>'+money(c.cashSales)+'</td><td>'+money(d.vat7)+'</td><td>'+money(d.vat19)+'</td><td>'+money(c.diff)+'</td><td>'+money(c.expensesTotal)+'</td><td>'+escapeHtml(detail)+'</td></tr>'}); html+='<tr><td><b>Monat gesamt</b></td><td></td><td></td><td><b>'+money(t.cash)+'</b></td><td><b>'+money(t.v7)+'</b></td><td><b>'+money(t.v19)+'</b></td><td><b>'+money(t.diff)+'</b></td><td><b>'+money(t.exp)+'</b></td><td></td></tr></table></body></html>'; const blob=new Blob([html],{type:'application/vnd.ms-excel'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='Kassenbericht_Urbach_'+m+'.xls'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function unlock(){const stored=localStorage.getItem(PIN); const val=$('pinInput').value.trim(); if(!val){$('pinMsg').textContent='Bitte PIN eingeben.';return} if(!stored){localStorage.setItem(PIN,val); openApp();return} if(val===stored){openApp();} else {$('pinMsg').textContent='PIN falsch.';$('pinMsg').className='small bad'}}
function openApp(){$('pinBox').classList.add('hidden');$('app').classList.remove('hidden');load();initFields();}
function initFields(){if(!$('date').value)$('date').value=today(); if(!$('month').value)$('month').value=monthNow(); loadDate(); renderMonth();}
['startCash','endCash','vat7','vat19'].forEach(id=>$(id).addEventListener('input',renderCalc));
$('date').addEventListener('change',loadDate); $('month').addEventListener('change',renderMonth);
$('addExpenseBtn').onclick=()=>{const name=$('expenseName').value.trim()||'Ausgabe'; const amount=num($('expenseAmount').value); if(amount<=0)return; currentExpenses.push({name,amount}); $('expenseName').value=''; $('expenseAmount').value=''; renderCalc();}
$('saveDayBtn').onclick=saveDay; $('showReportBtn').onclick=()=>{saveDay();showReport();}; $('printBtn').onclick=()=>{showReport(); setTimeout(()=>window.print(),100)}; $('excelBtn').onclick=exportExcel; $('refreshMonthBtn').onclick=renderMonth;
$('pinBtn').onclick=unlock; $('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')unlock()}); $('logoutBtn').onclick=()=>{$('app').classList.add('hidden');$('pinBox').classList.remove('hidden');$('pinInput').value=''}; $('changePinBtn').onclick=()=>{const p=prompt('Neue PIN eingeben'); if(p){localStorage.setItem(PIN,p); alert('PIN geändert')}}; $('clearBtn').onclick=()=>{if(confirm('Wirklich alle Kassen-Daten auf diesem Gerät löschen?')){localStorage.removeItem(STORE); state={days:{}}; initFields();}};
if('serviceWorker'in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
if(localStorage.getItem(PIN)){ $('pinBtn').textContent='Entsperren'; } else { $('pinBtn').textContent='PIN speichern & öffnen'; }
</script>
</body></html>
